spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      url: ${REDIS_URI:redis://localhost:6379}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
  cloud:
    gateway:
      routes:
        # Product Service Routes
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
        # Order Service Routes
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        # Cart Service Routes (uses order-service)
        - id: cart-service
          uri: lb://order-service
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
        # Auth Service Routes
        - id: auth-service-api
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**
        # User Service Routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        # Admin UI - Vue 3 SPA static files
        - id: admin-ui-static
          uri: ${ADMIN_UI_STATIC_URI:classpath:/static/admin/}
          predicates:
            - Path=/admin/**
        # Admin UI root redirect
        - id: admin-ui-root
          uri: ${ADMIN_UI_STATIC_URI:classpath:/static/admin/}
          predicates:
            - Path=/
          filters:
            - RedirectTo=302,/admin/
        # Admin Aggregation API Routes (BFF Layer)
        - id: admin-api-aggregation
          uri: lb://gateway
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
  security:
    enabled: false

server:
  port: 8080
  shutdown: graceful
  tomcat:
    connection-timeout: 5000
  graceful:
    shutdown:
      wait-time: 30s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    lease-renewal-interval-in-seconds: 10
    health-check-url-path: /actuator/health

# Aggregation layer configuration
aggregation:
  cache:
    ttl-minutes: 5
  timeout:
    millis: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    eureka:
      client:
        enabled: true
