spring:
  application:
    name: admin-ui
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

config:
  service:
    url: ${CONFIG_SERVICE_URL:http://localhost:8888}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-admin-ui-jwt-signing}
  expiration: 86400000

server:
  port: 8084
  shutdown: graceful
  tomcat:
    connection-timeout: 5000
  graceful:
    shutdown:
      wait-time: 30s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    lease-renewal-interval-in-seconds: 10
    health-check-url-path: /actuator/health

vaadin:
  productionMode: false
  url-mapping: /admin/*

---
spring:
  config:
    activate:
      on-profile: docker
config:
  service:
    url: http://config-service:8888
vaadin:
  productionMode: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    eureka:
      client:
        enabled: true
