# ===========================================
# 海鲜商城微服务 - Docker Compose 配置
# ===========================================
# 支持两种部署模式:
#   1. JVM 模式 (默认): ./gradlew build
#   2. Native 模式: ./gradlew build -Pnative
# ===========================================

networks:
  seafood-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:

services:
  # ===========================================
  # 基础设施服务
  # ===========================================
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - seafood-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - seafood-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===========================================
  # 微服务 (JVM 模式 - 默认)
  # ===========================================
  discovery-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8761:8761"
    volumes:
      - ./backend/discovery-service/build/libs/discovery-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    networks:
      - seafood-network
    command: ["java", "-jar", "/app/app.jar"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  gateway:
    image: eclipse-temurin:17-jre
    ports:
      - "8080:8080"
    volumes:
      - ./backend/gateway/build/libs/gateway-1.0.0-SNAPSHOT.jar:/app/app.jar
    networks:
      - seafood-network
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  product-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8081:8081"
    volumes:
      - ./backend/product-service/build/libs/product-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    networks:
      - seafood-network
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_product
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  order-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8082:8082"
    volumes:
      - ./backend/order-service/build/libs/order-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    networks:
      - seafood-network
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_order
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  user-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8083:8083"
    volumes:
      - ./backend/user-service/build/libs/user-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    networks:
      - seafood-network
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_user
      - REDIS_URI=redis://redis:6379
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  admin-ui:
    image: eclipse-temurin:17-jre
    ports:
      - "8090:8084"
    volumes:
      - ./backend/admin-ui/build/libs/admin-ui-1.0.0-SNAPSHOT.jar:/app/app.jar
    networks:
      - seafood-network
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

# ===========================================
# Native Profile 覆盖配置
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.native.yml up -d
# 构建命令: ./gradlew build -Pnative
# ===========================================
