# ===========================================
# 海鲜商城微服务 - Docker Compose 配置
# ===========================================
# 支持两种部署模式:
#   1. JVM 模式 (默认): ./gradlew build
#   2. Native 模式: ./gradlew build -Pnative
# ===========================================

volumes:
  mongodb_data:
  redis_data:

services:
  # ===========================================
  # 基础设施服务
  # ===========================================
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ===========================================
  # 微服务 (JVM 模式 - 默认)
  # ===========================================
  discovery-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8761:8761"
    volumes:
      - ./backend/discovery-service/build/libs/discovery-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]

  gateway:
    image: eclipse-temurin:17-jre
    ports:
      - "8080:8080"
    volumes:
      - ./backend/gateway/build/libs/gateway-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      - discovery-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/

  product-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8081:8081"
    volumes:
      - ./backend/product-service/build/libs/product-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      - mongodb
      - discovery-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_product

  order-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8082:8082"
    volumes:
      - ./backend/order-service/build/libs/order-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      - mongodb
      - discovery-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_order

  user-service:
    image: eclipse-temurin:17-jre
    ports:
      - "8083:8083"
    volumes:
      - ./backend/user-service/build/libs/user-service-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      - mongodb
      - redis
      - discovery-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_user
      - REDIS_URI=redis://redis:6379

  admin-ui:
    image: eclipse-temurin:17-jre
    ports:
      - "8090:8090"
    volumes:
      - ./backend/admin-ui/build/libs/admin-ui-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    depends_on:
      - discovery-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/

# ===========================================
# Native Profile 覆盖配置
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.native.yml up -d
# 构建命令: ./gradlew build -Pnative
# ===========================================
