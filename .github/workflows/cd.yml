name: CD Deploy

on:
  workflow_run:
    workflows: ["CI Build & Test"]
    types: [completed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # 构建并推送 Docker 镜像
  # ===========================================
  build-and-push-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'staging' }}

    strategy:
      matrix:
        service:
          - discovery-service
          - gateway
          - product-service
          - order-service
          - user-service
          - admin-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build JAR for ${{ matrix.service }}
        run: ./gradlew :backend:${{ matrix.service }}:bootJar
        working-directory: backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }},enable=true

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE=build/libs/${{ matrix.service }}-1.0.0-SNAPSHOT.jar

      - name: Image digest
        run: |
          echo "Built and pushed ${{ matrix.service }}@sha256:${{ steps.meta.outputs.digest }}"

  # ===========================================
  # 构建原生镜像 (GraalVM)
  # ===========================================
  build-native-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: production

    strategy:
      matrix:
        service:
          - discovery-service
          - gateway
          - product-service
          - order-service
          - user-service
          - admin-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v2
        with:
          version: '23'
          java-version: '17'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR for ${{ matrix.service }}
        run: ./gradlew :backend:${{ matrix.service }}:bootJar
        working-directory: backend

      - name: Build native image
        run: |
          timeout 60 ./gradlew :backend:${{ matrix.service }}:nativeRun || true
        working-directory: backend
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for native-${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/native-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push native-${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          dockerfile: ./backend/${{ matrix.service }}/Dockerfile.native
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================
  # 部署到服务器
  # ===========================================
  deploy-to-server:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: [build-and-push-images]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Determine compose files
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "COMPOSE_FILES=-f docker-compose.yml -f docker-compose.prod.yml" >> $GITHUB_ENV
          else
            echo "COMPOSE_FILES=-f docker-compose.yml" >> $GITHUB_ENV
          fi

      - name: Deploy to server
        run: |
          echo "Deploying to ${{ secrets.DEPLOY_HOST }} (env: ${{ github.event.inputs.environment || 'staging' }})"
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /opt/seafood-miniapp

            # Pull latest images
            docker compose $COMPOSE_FILES pull

            # Stop existing containers gracefully
            docker compose $COMPOSE_FILES stop || true

            # Start services
            docker compose $COMPOSE_FILES up -d

            # Wait for services to be healthy
            sleep 15

            # Show status
            docker compose $COMPOSE_FILES ps
            docker compose $COMPOSE_FILES logs --tail=50
          EOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Health check
        run: |
          sleep 30
          echo "Running health checks..."
          curl -f --connect-timeout 10 http://${{ secrets.DEPLOY_HOST }}:8080/actuator/health && echo "Gateway: OK" || echo "Gateway: FAILED"
          curl -f --connect-timeout 10 http://${{ secrets.DEPLOY_HOST }}:8081/actuator/health && echo "Product: OK" || echo "Product: FAILED"
          curl -f --connect-timeout 10 http://${{ secrets.DEPLOY_HOST }}:8082/actuator/health && echo "Order: OK" || echo "Order: FAILED"
          curl -f --connect-timeout 10 http://${{ secrets.DEPLOY_HOST }}:8083/actuator/health && echo "User: OK" || echo "User: FAILED"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

  # ===========================================
  # 更新 GitHub Release 信息
  # ===========================================
  update-release:
    runs-on: ubuntu-latest
    needs: [build-and-push-images]
    if: github.event_name == 'release'
    environment: production

    steps:
      - name: Create release notes
        run: |
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/discovery-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/product-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/order-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/user-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/admin-ui:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: $GITHUB_STEP_SUMMARY
          retention-days: 30
