name: CD Deploy

on:
  workflow_run:
    workflows: ["CI Build & Test"]
    types: [completed]
    branches: [main]
  release:
    types: [published]

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # 构建并推送 Docker 镜像
  # ===========================================
  build-and-push-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event.workflow_run.conclusion == 'success')
    environment: production

    strategy:
      matrix:
        service:
          - discovery-service
          - gateway
          - product-service
          - order-service
          - user-service
          - admin-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build JAR for ${{ matrix.service }}
        run: ./gradlew :backend:${{ matrix.service }}:build -x test
        working-directory: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE=build/libs/${{ matrix.service }}-1.0.0-SNAPSHOT.jar

  # ===========================================
  # 构建原生镜像 (GraalVM)
  # ===========================================
  build-native-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: production

    strategy:
      matrix:
        service:
          - discovery-service
          - gateway
          - product-service
          - order-service
          - user-service
          - admin-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v2
        with:
          version: '23'
          java-version: '17'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR for ${{ matrix.service }}
        run: ./gradlew :backend:${{ matrix.service }}:bootJar
        working-directory: .

      - name: Build native image
        run: |
          ./gradlew :backend:${{ matrix.service }}:nativeRun &
          NATIVE_PID=$!
          sleep 5
          kill $NATIVE_PID 2>/dev/null || true
        working-directory: .
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for native-${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/native-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push native-${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          dockerfile: ./backend/${{ matrix.service }}/Dockerfile.native
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================
  # 部署到服务器
  # ===========================================
  deploy-to-server:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [build-and-push-images]
    environment: production

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          echo "Deploying release ${{ github.ref_name }} to ${{ secrets.DEPLOY_HOST }}"
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /opt/seafood-miniapp

            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.native.yml pull

            # Stop existing containers
            docker compose -f docker-compose.yml -f docker-compose.native.yml down

            # Start services
            docker compose -f docker-compose.yml -f docker-compose.native.yml up -d

            # Show status
            docker compose -f docker-compose.yml -f docker-compose.native.yml ps
            docker compose -f docker-compose.yml -f docker-compose.native.yml logs --tail=100
          EOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

      - name: Health check
        run: |
          sleep 30
          curl -f http://${{ secrets.DEPLOY_HOST }}:8080/actuator/health || exit 1
          curl -f http://${{ secrets.DEPLOY_HOST }}:8761/actuator/health || exit 1
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

  # ===========================================
  # 更新 GitHub Release 信息
  # ===========================================
  update-release:
    runs-on: ubuntu-latest
    needs: [build-and-push-images]
    if: github.event_name == 'release'
    environment: production

    steps:
      - name: Create release notes
        run: |
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/discovery-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/product-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/order-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/user-service:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository }}/admin-ui:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY