# ===========================================
# Docker Compose Native Profile 配置 v2.0
# Spring Boot 4.0.6 + JDK 25 + AOT 缓存构建
# ===========================================
# 使用方式:
#   1. 构建镜像: docker-compose build
#   2. 启动服务: docker-compose -f docker-compose.yml -f docker-compose.native.yml up -d
# ===========================================

networks:
  seafood-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:

services:
  # ===========================================
  # 基础设施服务
  # ===========================================
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - seafood-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - seafood-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.125"

  # ===========================================
  # 微服务 (AOT 缓存构建)
  # ===========================================
  discovery-service:
    build:
      context: ./backend/discovery-service
      dockerfile: Dockerfile
    image: docker.io/library/discovery-service:2.0.0-SNAPSHOT
    ports:
      - "8761:8761"
    networks:
      - seafood-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  config-service:
    build:
      context: ./backend/config-service
      dockerfile: Dockerfile
    image: docker.io/library/config-service:2.0.0-SNAPSHOT
    ports:
      - "8888:8888"
    networks:
      - seafood-network
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8888/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:dGVzdC1rZXktZm9yLWVuY3J5cHRpb24tb25seS1kZXYtbm90LWZvci1wcm9k}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    image: docker.io/library/gateway:2.0.0-SNAPSHOT
    ports:
      - "8080:8080"
    networks:
      - seafood-network
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 192M
          cpus: "0.25"

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    image: docker.io/library/product-service:2.0.0-SNAPSHOT
    ports:
      - "8081:8081"
    networks:
      - seafood-network
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_product
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 192M
          cpus: "0.25"

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    image: docker.io/library/order-service:2.0.0-SNAPSHOT
    ports:
      - "8082:8082"
    networks:
      - seafood-network
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_order
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 192M
          cpus: "0.25"

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    image: docker.io/library/user-service:2.0.0-SNAPSHOT
    ports:
      - "8083:8083"
    networks:
      - seafood-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
      - MONGODB_URI=mongodb://mongodb:27017/seafood_user
      - REDIS_URI=redis://redis:6379
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 192M
          cpus: "0.25"

  admin-ui:
    build:
      context: ./backend/admin-ui
      dockerfile: Dockerfile
    image: docker.io/library/admin-ui:2.0.0-SNAPSHOT
    ports:
      - "8090:8084"
    networks:
      - seafood-network
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 20s
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://discovery-service:8761/eureka/
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
